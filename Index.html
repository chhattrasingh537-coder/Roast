<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROAST ME PRO 🔥</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0a0a0a, #000);
  color:white;
  text-align:center;
}

h1 {
  color:#ff0055;
  text-shadow:0 0 15px #ff0055;
}

.container {
  padding:20px;
}

input {
  margin:15px;
}

.poster {
  position:relative;
  width:320px;
  margin:20px auto;
  border-radius:20px;
  overflow:hidden;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  box-shadow:0 0 30px rgba(255,0,100,0.4);
  transition:0.3s;
}

.poster:hover {
  transform:scale(1.03);
}

.poster img {
  width:100%;
  height:300px;
  object-fit:cover;
  filter:brightness(1.1) contrast(1.2);
}

.title {
  position:absolute;
  top:10px;
  width:100%;
  font-weight:bold;
  font-size:18px;
  letter-spacing:2px;
}

.roasts {
  padding:15px;
}

.roast {
  background:rgba(255,255,255,0.08);
  margin:10px 0;
  padding:12px;
  border-radius:12px;
  border-left:3px solid #ff0055;
  opacity:0;
}

button {
  padding:12px 18px;
  margin:10px;
  border:none;
  background:#ff0055;
  color:white;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  box-shadow:0 0 10px #ff0055;
}

button:hover {
  transform:scale(1.05);
}

select {
  padding:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🔥 ROAST ME PRO</h1>

  <input type="file" id="upload" accept="image/*"><br>

  <select id="mode">
    <option value="soft">Soft Roast 😄</option>
    <option value="savage">Savage 😈</option>
  </select>

  <div class="poster" id="poster">
    <div class="title">ROAST REPORT 🔥</div>
    <img id="image">
    <div class="roasts" id="roasts"></div>
  </div>

  <button onclick="generateRoast()">Generate Roast</button>
  <button onclick="downloadPoster()">Download</button>
</div>

<script>
const softRoasts = [
"You look like a loading screen… still waiting 😭",
"Your style is… unique, let's keep it that way 😅",
"You got confidence… just missing the reason 😂",
"You look like Monday morning 😴"
];

const savageRoasts = [
"Bro looks like WiFi signal — weak and unstable 💀",
"Even your shadow doesn’t follow you 😭",
"You look like a before picture… forever 🤡",
"Your vibe is buffering… permanently ⏳",
"Confidence high, reality low 😈"
];

function generateRoast(){
  const mode = document.getElementById("mode").value;
  const roastsDiv = document.getElementById("roasts");
  roastsDiv.innerHTML = "";

  let list = mode === "savage" ? savageRoasts : softRoasts;

  let selected = [];
  while(selected.length < 3){
    let r = list[Math.floor(Math.random()*list.length)];
    if(!selected.includes(r)){
      selected.push(r);
    }
  }

  selected.forEach((text,i)=>{
    setTimeout(()=>{
      let div = document.createElement("div");
      div.className="roast";
      roastsDiv.appendChild(div);

      typeEffect(div, text);
    }, i*800);
  });
}

// TYPEWRITER EFFECT
function typeEffect(element, text){
  let i=0;
  let interval = setInterval(()=>{
    element.style.opacity = 1;
    element.innerHTML += text.charAt(i);
    i++;
    if(i>=text.length) clearInterval(interval);
  }, 30);
}

// IMAGE UPLOAD
document.getElementById("upload").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(file){
    document.getElementById("image").src = URL.createObjectURL(file);
  }
});

// DOWNLOAD
function downloadPoster(){
  html2canvas(document.getElementById("poster"), {scale:2}).then(canvas=>{
    let link = document.createElement("a");
    link.download="roast-pro.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}
</script>

</body>
</html>
