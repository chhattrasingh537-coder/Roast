<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roast Me Pro 🔥</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0a0a0a;
  color:white;
  text-align:center;
}

h1 { color:#ff0055; }

.container { padding:20px; }

.poster {
  position:relative;
  width:320px;
  margin:20px auto;
  border-radius:20px;
  overflow:hidden;
  background:#111;
  box-shadow:0 0 25px rgba(255,0,100,0.4);
}

.poster img {
  width:100%;
  height:300px;
  object-fit:cover;
}

.title {
  position:absolute;
  top:10px;
  width:100%;
  font-weight:bold;
}

.roasts { padding:15px; }

.roast {
  background:rgba(255,255,255,0.1);
  margin:10px 0;
  padding:12px;
  border-radius:10px;
  opacity:0;
  transform:translateY(20px);
  animation:fade 0.5s forwards;
}

@keyframes fade {
  to {opacity:1; transform:translateY(0);}
}

button {
  padding:12px;
  margin:8px;
  border:none;
  background:#ff0055;
  color:white;
  border-radius:10px;
  font-weight:bold;
}

.ad-box {
  margin:15px;
  padding:10px;
  background:#222;
  border-radius:10px;
  font-size:12px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="container">
  <h1>🔥 ROAST ME PRO</h1>

  <input type="file" id="upload" accept="image/*"><br>

  <div class="poster" id="poster">
    <div class="title">ROAST REPORT 🔥</div>
    <img id="image">
    <div class="roasts" id="roasts"></div>
  </div>

  <div class="ad-box">Your Ad Here</div>

  <button onclick="generateRoast()">Generate Roast</button>
  <button onclick="downloadPoster()">Download</button>
  <button onclick="sharePoster()">Share 🔥</button>
  <button onclick="referApp()">Refer 🤝</button>
</div>

<script>
const roasts = [
"Bro looks like WiFi signal — weak and unstable 💀",
"Confidence level: 100, reality check: pending 🤡",
"You look like a before picture… forever 😭",
"Your vibe is buffering… permanently ⏳",
"You didn’t wake up like this… you should’ve stayed asleep 😴",
"Even Google can’t find your personality 🔍",
"You look like your phone battery always at 1% 🔋"
];

function generateRoast(){
  const box = document.getElementById("roasts");
  box.innerHTML = "";

  let selected = [];
  while(selected.length < 3){
    let r = roasts[Math.floor(Math.random()*roasts.length)];
    if(!selected.includes(r)){
      selected.push(r);
    }
  }

  selected.forEach((text,i)=>{
    setTimeout(()=>{
      let div = document.createElement("div");
      div.className="roast";
      div.innerText = text;
      box.appendChild(div);
    }, i*400);
  });
}

// IMAGE UPLOAD
document.getElementById("upload").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(file){
    document.getElementById("image").src = URL.createObjectURL(file);
  }
});

// DOWNLOAD
function downloadPoster(){
  html2canvas(document.getElementById("poster"), {scale:2}).then(canvas=>{
    let image = canvas.toDataURL("image/png");

    let link = document.createElement("a");
    link.href = image;
    link.download = "roast.png";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    setTimeout(()=>{ window.open(image); },500);
  });
}

// SHARE FUNCTION 🔥
function sharePoster(){
  html2canvas(document.getElementById("poster"), {scale:2}).then(canvas=>{
    canvas.toBlob(blob=>{
      const file = new File([blob], "roast.png", { type: "image/png" });

      if(navigator.share){
        navigator.share({
          files: [file],
          title: "Roast Me 🔥",
          text: "Check out this savage roast 😂🔥"
        });
      } else {
        alert("Sharing not supported on this device");
      }
    });
  });
}

// REFER FUNCTION 🤝
function referApp(){
  const text = "🔥 Try this Roast Me App 😂👉 https://roastxme.netlify.app";
  
  if(navigator.share){
    navigator.share({
      title: "Roast Me App",
      text: text
    });
  } else {
    navigator.clipboard.writeText(text);
    alert("Referral link copied!");
  }
}
</script>

</body>
</html>
<script>(function(s){s.dataset.zone='10801634',s.src='https://al5sm.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>
